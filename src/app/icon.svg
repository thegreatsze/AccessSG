<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Green background -->
  <rect width="32" height="32" rx="7" fill="#16a34a"/>
  <!-- Outer tyre ring — white, thick stroke -->
  <circle cx="16" cy="16" r="11" stroke="white" stroke-width="2.8" fill="none"/>
  <!-- 6 spokes at 0°/60°/120°/180°/240°/300° -->
  <!-- inner radius 4, outer radius 9 (inside tyre ring inner edge) -->
  <line x1="20"   y1="16"    x2="25"   y2="16"    stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="18"   y1="19.46" x2="20.5" y2="23.79" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="14"   y1="19.46" x2="11.5" y2="23.79" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="12"   y1="16"    x2="7"    y2="16"    stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="14"   y1="12.54" x2="11.5" y2="8.21"  stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="18"   y1="12.54" x2="20.5" y2="8.21"  stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Hub — orange accent -->
  <circle cx="16" cy="16" r="3.5" fill="#f97316"/>
</svg>
